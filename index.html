<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/font/sans.css">
    <style>
        body {
            font-family: 'Geist Sans', 'Geist Fallback', sans-serif;
        }
        .modal-open {
            overflow: hidden;
        }
        .modal-overlay {
            transition: opacity 0.2s ease-out, visibility 0.2s;
            opacity: 0;
            visibility: hidden;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: scale(0.9);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
    </style>
</head>

<body class="bg-white text-gray-900">
    <main class="min-h-screen p-6 md:p-8">
        <div class="mx-auto max-w-6xl">
            <div class="mb-8 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                <div>
                    <h1 class="text-3xl font-bold">Quản Lý Danh Bạ</h1>
                    <p class="text-gray-500 mt-2">Quản lý và tổ chức danh bạ của bạn một cách dễ dàng</p>
                </div>
                <button onclick="openModal()"
                    class="inline-flex items-center justify-center rounded-lg bg-black px-3 py-2 text-sm font-medium text-white hover:bg-black/80 transition-colors gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14m-7-7v14" />
                    </svg>
                    Thêm Danh Bạ
                </button>
            </div>
            <div
                class="mb-6 flex items-center gap-3 rounded-lg border bg-white px-3 py-2 shadow-sm focus-within:ring-2 focus-within:ring-blue-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="text-gray-400">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                </svg>
                <input type="text" id="search-input" class="w-full px-3 py-1 bg-transparent outline-none text-sm"
                    placeholder="Tìm kiếm theo tên, số điện thoại hoặc email...">
            </div>
            <div id="contact-grid" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
        </div>
    </main>
    <div id="modal"
        class="modal-overlay fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
        <div class="modal-content bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden relative p-6">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6 6 18" />
                    <path d="m6 6 12 12" />
                </svg>
            </button>
            <div class="mb-6">
                <h2 id="modal-title" class="text-lg font-bold text-gray-900">Thêm Danh Bạ Mới</h2>
                <p id="modal-subtitle" class="text-gray-500 text-sm mt-1">Nhập thông tin danh bạ mới</p>
            </div>
            <form id="contact-form" class="space-y-4">
                <input type="hidden" id="contact-id">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Họ Tên *</label>
                    <input type="text" id="name" placeholder="Nhập họ tên"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-gray-300 outline-none transition-all">
                    <p id="error-name" class="text-red-500 text-sm mt-1 hidden"></p>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Số Điện Thoại *</label>
                    <input type="text" id="phone" placeholder="Nhập số điện thoại"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-gray-300 outline-none transition-all">
                    <p id="error-phone" class="text-red-500 text-sm mt-1 hidden"></p>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Email *</label>
                    <input type="text" id="email" placeholder="Nhập email"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-gray-300 outline-none transition-all">
                    <p id="error-email" class="text-red-500 text-sm mt-1 hidden"></p>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Địa Chỉ</label>
                    <textarea id="address" placeholder="Nhập địa chỉ (tùy chọn)" rows="3"
                        class="w-full border border-gray-300 rounded-lg resize-y min-h-[80px] max-h-[200px] px-3 py-2 text-sm focus:ring-2 focus:ring-gray-300 outline-none transition-[border-color,ring] duration-300 resize-none"></textarea>
                    <p id="error-address" class="text-red-500 text-sm mt-1 hidden"></p>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()"
                        class="flex-1 bg-white border border-gray-200 py-2 px-4 rounded-lg text-sm font-bold hover:bg-gray-50 transition-colors">Hủy</button>
                    <button type="submit" id="btn-submit"
                        class="flex-1 bg-black text-white py-2 px-4 rounded-lg text-sm font-bold hover:bg-black/80 transition-colors">Thêm</button>
                </div>
            </form>
        </div>
    </div>
    <div id="delete-modal"
        class="modal-overlay fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
        <div
            class="modal-content bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden p-6 text-center md:text-left">
            <h2 class="text-[18px] font-bold text-gray-900 mb-2">Xác Nhận Xóa</h2>
            <p class="text-gray-500 text-sm mb-4">Bạn có chắc muốn xóa danh bạ này không? Hành động này không thể hoàn
                tác.</p>
            <div class="flex gap-2">
                <button onclick="closeDeleteModal()"
                    class="flex-1 bg-white border border-gray-200 py-2 px-4 rounded-lg text-sm font-bold hover:bg-gray-50 transition-colors">Hủy</button>
                <button id="btn-confirm-delete"
                    class="flex-1 bg-red-600 text-white py-2 px-4 rounded-lg text-sm font-bold hover:bg-red-700 transition-colors">Xóa</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
